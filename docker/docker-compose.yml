version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: athena_postgres
    environment:
      POSTGRES_USER: athena_admin
      POSTGRES_PASSWORD: athena_secure_password
      POSTGRES_DB: athena_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: athena_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
